    body {

    .big {

    .small {
      font-size: .7em;
    }

    .square {
      width: .7em;

      display: inline-block;
    }

    /* Custom dropdown */
    .custom-dropdown {
      position: relative;
      display: inline-block;
      vertical-align: middle;
      margin: 10px; /* demo only */
    }

    .custom-dropdown select {
      background-color: #782425;
      color: #fff;
      font-size: inherit;
      padding: .5em;
      padding-right: 2.5em; 
      border: 0;
      margin: 0;
      border-radius: 3px;
      text-indent: 0.01px;
      font-weight: 700;
      text-overflow: '';
      -webkit-appearance: button; /* hide default arrow in chrome OSX */
    }

    .custom-dropdown::before,
    .custom-dropdown::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .custom-dropdown::after { /*  Custom dropdown arrow */
      height: 1em;
      font-size: .625em;
      line-height: 1;
      right: 1.2em;
      top: 50%;
      margin-top: -.5em;
    }

    .custom-dropdown::before { /*  Custom dropdown arrow cover */
      width: 2em;
      right: 0;
      top: 0;
      bottom: 0;
      border-radius: 0 3px 3px 0;
    }

    .custom-dropdown select[disabled] {
      color: rgba(0,0,0,.3);
    }

    .custom-dropdown select[disabled]::after {
      color: rgba(0,0,0,.1);
    }

    .custom-dropdown::before {
      background-color: rgba(0,0,0,.15);
    }

    .custom-dropdown::after {
      color: rgba(0,0,0,.4);
    }

  </style>

  <!--====== FEATRES PART START ======-->

  <section id="features" class="features-area-index pt-60 pb-100">
    <div class="container">
      <div align="center">
        <div class="row">
          <div class="col-md-12">
            <img src="assets/images/logo.svg" alt="Logo">
          </div>
        </div>
        <div class="row justify-content-md-center">
          <div class="col-md-6 auto">
            <h4 class="titulo-escolha pt-30 pb-10">Selecione sua cidade abaixo e confira os planos disponíveis para você!</h4>
          </div>
        </div>
        <div class="features-content">

          <span class="custom-dropdown big">
            <select id="selectid" onchange="mostraCidade()">    
              <option value="Selecione">Escolha sua cidade...</option>
              <option value="Coxim-MS">Coxim-MS</option>
              <option value="Costa Rica-MS">Costa Rica-MS</option>  
              <option value="Rio Verde de Mato Grosso-MS">Rio Verde de Mato Grosso-MS</option>
              <option value="Pedro Gomes-MS">Pedro Gomes-MS</option>
              <option value="São Gabriel do Oeste-MS">São Gabriel do Oeste-MS</option>
            </select>
          </span>

        </div>
        <div id="infoCidade" class='row justify-content-center'>
        </div>
        <div id="teste"></div>

      </div>
    </div> <!-- container -->
  </section>

  <!--====== FEATRES PART ENDS ======-->

  <script type="text/javascript">

    function mostraCidade(){
      var cidade = document.getElementById('selectid').value
      var nome = "";
      var img = "";
      var endereco = "";
      var link = "";
      if(cidade != "Selecione"){
        if(cidade == "Coxim-MS"){
          nome = "Coxim";
          img = "'assets/images/cidades/cxm.svg'";
          endereco = "Av. Virgínia Ferreira, 907<br>Flávio Garcia, 79400-000";
          link = "'cxm.html'";
        }
        if(cidade == "Rio Verde de Mato Grosso-MS"){
          nome = "Rio Verde";
          img = "'assets/images/cidades/rv.svg'";
          endereco = "Rua Porfirio Gonçalves, 921 B<br>Centro, 79480-000";
          link = "'rv.html'";
        }
        if(cidade == "Pedro Gomes-MS"){
          nome = "Pedro Gomes";
          img = "'assets/images/cidades/pgm.svg'";
          endereco = "Rua Diamantino, 44<br>Centro, 79410-000";
          link = "'pgm.html'";
        }
        if(cidade == "Costa Rica-MS"){
          nome = "Costa Rica";
          img = "'assets/images/cidades/crc.svg'";
          endereco = "Av. José Ferreira da Costa, 1434<br>Centro, 79550-000";
          link = "'crc.html'";
        }
        if(cidade == "São Gabriel do Oeste-MS"){
          nome = "São Gabriel do Oeste";
          img = "'assets/images/cidades/sgo.svg'";
          endereco = "Av. Getúlio Vargas, 209<br>Centro, 79490-000";
          link = "'sgo.html'";
        }
        document.getElementById("infoCidade").innerHTML = 
        "<div id='meApague' class='col-lg-4 col-md-7 col-sm-9'><div class='single-features text-center mt-40'><div class='features-icon'><img src="+img+"></div><div class='features-content'><h4 class='features-title'><a href="+link+">"+nome+"</a></h4><p class='text'>"+endereco+"</p><div class='features-btn rounded-buttons'><a class='main-btn rounded-one' href="+link+">CLIQUE AQUI</a></div></div></div></div>";
      }else{
        document.getElementById("meApague").remove();
      }
    }
  </script>
